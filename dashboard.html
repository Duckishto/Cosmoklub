<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>CosmoKlub: Forum & Library & Chat</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="aurora-wrap"><div class="aurora-base"></div><div class="aurora-1"></div><div class="aurora-2"></div><div class="aurora-3"></div></div>
<canvas id="star-canvas"></canvas>
<div class="page-grid"></div>

<div id="app">
  <div class="app-shell">

    <!-- Top bar -->
    <div class="topbar">
      <div class="brand">
        <svg width="22" height="22" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="5" r="2.2" fill="#a855f7"/><circle cx="5" cy="18" r="1.7" fill="#c084fc"/><circle cx="21" cy="18" r="1.7" fill="#c084fc"/><circle cx="13" cy="14" r="1.3" fill="#e9d5ff" opacity="0.7"/><line x1="13" y1="5" x2="5" y2="18" stroke="#a855f7" stroke-width="1" stroke-opacity="0.55"/><line x1="13" y1="5" x2="21" y2="18" stroke="#a855f7" stroke-width="1" stroke-opacity="0.55"/><line x1="5" y1="18" x2="21" y2="18" stroke="#c084fc" stroke-width="1" stroke-opacity="0.45"/></svg>
        CosmoKlub
      </div>
      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>{{ searchPlaceholder }}</span>
      </div>
      <div class="topbar-actions">
        <div class="icon-btn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="icon-dot"></span>
        </div>
        <div class="icon-btn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>
      </div>
    </div>

    <div class="content">
      <!-- Each tab is an independent component; see components/*.js.
           tabComponents maps tab name -> component, defined in app.js. -->
      <component :is="tabComponents[activeTab]"></component>
    </div>

    <!-- Bottom navigation (5 items: Forum, Library, new-post FAB, Planetarium, Chat) -->
    <div class="bottom-nav">
      <div class="nav-item" :class="{active: activeTab === 'forum'}" @click="activeTab = 'forum'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>
        Forum
      </div>
      <div class="nav-item" :class="{active: activeTab === 'library'}" @click="activeTab = 'library'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Library
      </div>
      <div class="nav-item fab-item" @click="alert('Create new post / thread (coming soon)')">
        <div class="nav-fab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </div>
      <div class="nav-item" :class="{active: activeTab === 'planetarium'}" @click="activeTab = 'planetarium'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.5"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
        Planetarium
      </div>
      <div class="nav-item" :class="{active: activeTab === 'chat'}" @click="activeTab = 'chat'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Chat
      </div>
    </div>

  </div>
</div>

<!-- Components must load before app.js, which registers and mounts them -->
<script src="components/forum.js"></script>
<script src="components/library.js"></script>
<script src="components/chat.js"></script>
<script src="components/planetarium.js"></script>
<script src="app.js"></script>
</body>
</html>
